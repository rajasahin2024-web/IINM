# IINM Nginx Reverse Proxy Configuration
# Cloudflare handles SSL termination — nginx only proxies internally.
#
# Apply:
#   sudo cp /www/wwwroot/iinm/nginx-iinm.conf /etc/nginx/sites-available/iinm
#   sudo ln -sf /etc/nginx/sites-available/iinm /etc/nginx/sites-enabled/iinm
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ── Upstream definitions ──
upstream iinm_frontend {
    server 127.0.0.1:2021;
    keepalive 32;
}

upstream iinm_backend {
    server 127.0.0.1:2007;
    keepalive 32;
}

# ── Frontend (Next.js) — iinmedu.com & www.iinmedu.com ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name iinmedu.com www.iinmedu.com;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    server_tokens off;

    # Block common attack paths
    location ~* /(wp-admin|wp-login|wp-content|wp-includes|administrator|phpmyadmin|\.env|\.git|\.ssh) {
        return 404;
    }

    # Block PHP execution attempts
    location ~ \.php$ {
        return 404;
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://iinm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ── Backend API (FastAPI) — api.iinmedu.com ──
server {
    listen 80;
    listen [::]:80;
    server_name api.iinmedu.com;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    server_tokens off;

    # Block attack paths
    location ~* /(wp-admin|wp-login|wp-content|administrator|phpmyadmin|\.env|\.git|\.ssh) {
        return 404;
    }

    location ~ \.php$ {
        return 404;
    }

    # Rate limit login & device request endpoints
    location ~ ^/api/(login|request-device|device-admin/login)$ {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://iinm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # General API rate limiting
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://iinm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }
}
